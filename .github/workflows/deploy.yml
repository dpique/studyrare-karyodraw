name: Deploy to Cloudflare

# Publishes the site on every push to main that touches a served file (and on
# demand via "Run workflow"). This closes the hands-off loop: a brand-sync PR
# (or any content change) merged to main goes live automatically.
#
# Requires ONE repo secret: CLOUDFLARE_API_TOKEN. Until it's added, the job
# skips gracefully (green with a warning) instead of failing.

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - '404.html'
      - '*.js'
      - 'preview.png'
      - 'robots.txt'
      - 'sitemap.xml'
      - 'wrangler.jsonc'
      - '.assetsignore'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy with wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN secret not set — skipping deploy. Add it in Settings ▸ Secrets and variables ▸ Actions to enable auto-deploy."
            exit 0
          fi
          npx --yes wrangler@4 deploy
