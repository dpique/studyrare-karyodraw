name: Deploy to Cloudflare

# Publishes the site on every push to main that touches a served file (and on
# demand via "Run workflow"). This closes the hands-off loop: a brand-sync PR
# (or any content change) merged to main goes live automatically.
#
# Requires ONE repo secret: CLOUDFLARE_API_TOKEN. Until it's added, the job
# skips gracefully (green with a warning) instead of failing.

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - '404.html'
      - '*.js'
      - 'content/**'
      - 'karyotype/**'
      - 'scripts/**'
      - 'preview.png'
      - 'robots.txt'
      - 'sitemap.xml'
      - 'wrangler.jsonc'
      - '.assetsignore'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Regenerate the SEO landing pages, the homepage "Common karyotypes" list, and
      # sitemap.xml from content/karyotypes.js so the single source of truth is always
      # what ships, even if the committed generated files were stale.
      - name: Build landing pages
        run: BUILD_DATE=$(date +%F) node scripts/build-pages.mjs
      - name: Deploy with wrangler
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN secret not set — skipping deploy. Add it in Settings ▸ Secrets and variables ▸ Actions to enable auto-deploy."
            echo "deployed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          npx --yes wrangler@4 deploy
          echo "deployed=true" >> "$GITHUB_OUTPUT"
      # Tell IndexNow (Bing, Yandex, and other participating engines) about the URL
      # set so new/changed pages are crawled quickly. Google ignores IndexNow; it is
      # covered by the sitemap + Search Console. Non-fatal.
      - name: Ping IndexNow
        if: steps.deploy.outputs.deployed == 'true'
        run: node scripts/indexnow.mjs || true
